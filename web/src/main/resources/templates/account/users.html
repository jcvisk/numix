<!DOCTYPE html>
<html lang="es" layout:decorate="~{layout/base}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title layout:fragment="title">Usuarios de Cuenta</title>
</head>
<body>
<th:block layout:fragment="breadcome">
    <div class="breadcome-area">
        <div class="container-fluid">
            <div class="breadcome-list">
                <h2 class="mb-0">Usuarios de la cuenta</h2>
                <p class="mb-0">Gestión de usuarios ADMIN y AUX</p>
            </div>
        </div>
    </div>
</th:block>

<th:block layout:fragment="content">
    <div class="container-fluid mt-4">
        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

        <div class="card p-4 mb-4">
            <h5>Crear usuario</h5>
            <form th:action="@{/account/users/create}" method="post" th:object="${createForm}" class="row g-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="col-md-4">
                    <label class="form-label" for="fullName">Nombre</label>
                    <input class="form-control" id="fullName" type="text" th:field="*{fullName}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="email">Correo</label>
                    <input class="form-control" id="email" type="email" th:field="*{email}" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label" for="password">Contraseña</label>
                    <input class="form-control" id="password" type="password" th:field="*{password}" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label" for="roleCode">Rol</label>
                    <select class="form-select" id="roleCode" th:field="*{roleCode}" required>
                        <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
                    </select>
                </div>
                <div class="col-12">
                    <button class="btn btn-primary" type="submit">Crear usuario</button>
                </div>
            </form>
        </div>

        <div class="card p-4">
            <h5>Usuarios actuales</h5>
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.fullName}"></td>
                        <td th:text="${user.email}"></td>
                        <td th:text="${user.roleCode}"></td>
                        <td th:text="${user.enabled} ? 'ACTIVO' : 'INACTIVO'"></td>
                        <td>
                            <span th:if="${user.roleCode.name() == 'OWNER'}" class="text-muted">No editable</span>
                            <form th:if="${user.roleCode.name() != 'OWNER'}" th:action="@{/account/users/update}" method="post" class="d-flex gap-2 align-items-center">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="targetUserId" th:value="${user.id}">
                                <select class="form-select form-select-sm" name="roleCode">
                                    <option th:each="role : ${roles}" th:selected="${role == user.roleCode}" th:value="${role}" th:text="${role}"></option>
                                </select>
                                <select class="form-select form-select-sm" name="enabled">
                                    <option th:value="true" th:selected="${user.enabled}">ACTIVO</option>
                                    <option th:value="false" th:selected="${!user.enabled}">INACTIVO</option>
                                </select>
                                <button class="btn btn-sm btn-outline-primary" type="submit">Guardar</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
