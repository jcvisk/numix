<!DOCTYPE html>
<html lang="es" layout:decorate="~{layout/base}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title layout:fragment="title">Dashboard</title>
    <!--<th:block layout:fragment="styles"></th:block>-->
</head>
<body>

<th:block layout:fragment="breadcome">
    <div class="breadcome-area">
        <div class="container-fluid">
            <div class="row">
                <div class="col-lg-12 col-md-12 col-sm-12 col-12">
                    <div class="breadcome-list">
                        <div class="row">
                            <div class="col-lg-6 col-md-6 col-sm-6 col-6">
                                <div class="breadcomb-wp">
                                    <div class="breadcomb-icon">
                                        <i class="icon nalika-home"></i>
                                    </div>
                                    <div class="breadcomb-ctn d-flex flex-column justify-content-center">
                                        <h2 class="mb-0">Dashboard</h2>
                                        <p>Welcome to Numix </p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-6 col-md-6 col-sm-6 col-6">
                                <div class="breadcomb-report">
                                    <button data-bs-toggle="tooltip" data-bs-placement="left"
                                            title="Download Report" class="btn"><i class="icon nalika-download"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>

<th:block layout:fragment="content">

</th:block>

<!--<th:block layout:fragment="scripts"></th:block>-->
</body>
</html>
