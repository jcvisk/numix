<!doctype html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Register | Numix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/img/favicon.ico}">
    <link rel="stylesheet" th:href="@{/css/google-fonts/css2.css}">
    <link rel="stylesheet" th:href="@{/bootstrap/bootstrap.min.css}">
    <style>
        body {
            background: #152036;
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nk-auth-card {
            background: #1b2a47;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            width: 100%;
            max-width: 520px;
            padding: 40px;
        }
        .nk-auth-logo { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: 1px; }
        .nk-auth-logo span { color: #03a9f4; }
        .nk-auth-card .form-control {
            background: #152036;
            border: 1px solid #253a5c;
            color: #fff;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
        }
        .nk-auth-card .form-control:focus {
            border-color: #03a9f4;
            box-shadow: 0 0 0 2px rgba(3,169,244,0.15);
            background: #152036;
            color: #fff;
        }
        .nk-auth-card .form-label { color: #8a9bb5; font-size: 13px; font-weight: 500; }
        .btn-nk-primary {
            background: #03a9f4; border: none; color: #fff; border-radius: 8px;
            padding: 10px; font-weight: 500; font-size: 15px;
        }
        .btn-nk-outline {
            background: transparent; border: 1px solid #253a5c; color: #8a9bb5;
            border-radius: 8px; padding: 10px; font-size: 14px;
        }
        .nk-auth-footer { color: #5a6a7f; font-size: 13px; }
        .nk-auth-footer a { color: #03a9f4; text-decoration: none; }
        .nk-inline-message {
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid transparent;
        }
        .nk-inline-message.error {
            color: #ff9ca3;
            border-color: rgba(236, 68, 69, 0.35);
            background: rgba(236, 68, 69, 0.14);
        }
        .nk-inline-message.success {
            color: #7de2a3;
            border-color: rgba(36, 202, 161, 0.35);
            background: rgba(36, 202, 161, 0.14);
        }
    </style>
</head>

<body>
<div class="text-center px-3">
    <div class="nk-auth-card mx-auto mb-4">
        <div class="nk-auth-logo mb-2">N<span>umix</span></div>
        <p class="text-secondary mb-4" style="font-size:14px;">Crea una cuenta y usuario OWNER</p>

        <div class="nk-inline-message error text-start" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <div class="nk-inline-message success text-start" th:if="${successMessage}" th:text="${successMessage}"></div>

        <form th:action="@{/register}" method="post" th:object="${form}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="mb-3 text-start">
                <label class="form-label" for="accountName">Cuenta</label>
                <input type="text" id="accountName" class="form-control" th:field="*{accountName}" placeholder="Mi Empresa" required>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label" for="fullName">Nombre completo</label>
                <input type="text" id="fullName" class="form-control" th:field="*{fullName}" placeholder="Tu nombre" required>
            </div>
            <div class="row">
                <div class="col-sm-6 mb-3 text-start">
                    <label class="form-label" for="email">Correo</label>
                    <input type="email" id="email" class="form-control" th:field="*{email}" placeholder="owner@empresa.com" required>
                </div>
                <div class="col-sm-6 mb-3 text-start">
                    <label class="form-label" for="confirmEmail">Confirmar correo</label>
                    <input type="email" id="confirmEmail" class="form-control" th:field="*{confirmEmail}" placeholder="owner@empresa.com" required>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6 mb-3 text-start">
                    <label class="form-label" for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" th:field="*{password}" required>
                </div>
                <div class="col-sm-6 mb-3 text-start">
                    <label class="form-label" for="confirmPassword">Confirmar contraseña</label>
                    <input type="password" id="confirmPassword" class="form-control" th:field="*{confirmPassword}" required>
                </div>
            </div>
            <button type="submit" class="btn btn-nk-primary w-100 mb-3">Crear Cuenta</button>
            <a th:href="@{/login}" class="btn btn-nk-outline w-100">Ya tengo cuenta</a>
        </form>
    </div>

    <div class="nk-auth-footer mt-4">
        <p>&copy; 2026 <a href="https://colorlib.com/wp/templates/">Colorlib</a>. All rights reserved.</p>
    </div>
</div>
</body>
</html>
