spring.application.name=core

spring.datasource.url=${NUMIX_DB_URL:jdbc:postgresql://localhost:54326/numixdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${NUMIX_DB_USERNAME:changeme}
spring.datasource.password=${NUMIX_DB_PASSWORD:changeme}
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never
